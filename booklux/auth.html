<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | BookLux - AI Luxury Concierge</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600&display=swap');

        :root {
            --color-primary: #da1f22;
            --color-primary-dark: #b91a1d;
            --color-background: #ffffff;
            --color-surface: #ffffff;
            --color-text: #111111;
            --color-text-muted: #666666;
            --color-border: #e8e8e8;
            --color-accent: #ffffff;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --radius-lg: 32px;
            --radius-md: 12px;
            --container-width: 1200px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Navigation */
        header {
            position: sticky;
            top: 0;
            background: var(--color-background);
            border-bottom: 1px solid var(--color-border);
            z-index: 1000;
            padding: 1.25rem 0;
        }

        .nav-container {
            max-width: var(--container-width);
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 2.5rem;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--color-text);
            font-weight: 400;
            font-size: 0.95rem;
            transition: opacity 0.2s;
        }

        .nav-links a:hover {
            opacity: 0.7;
        }

        .cta-button {
            background-color: var(--color-primary);
            color: var(--color-accent);
            padding: 0.8rem 1.8rem;
            border-radius: var(--radius-lg);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .cta-button:hover {
            background-color: var(--color-primary-dark);
        }

        /* Auth Layout */
        main {
            min-height: calc(100vh - 200px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 1.5rem;
        }

        .auth-card {
            width: 100%;
            max-width: 480px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: 3rem 2.5rem;
            text-align: center;
        }

        .auth-header {
            margin-bottom: 2.5rem;
        }

        .auth-header img {
            margin-bottom: 1.5rem;
        }

        .auth-header h1 {
            font-weight: 100;
            font-size: 2.2rem;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .auth-header h1 i {
            font-style: italic;
        }

        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--color-border);
            margin-bottom: 2.5rem;
        }

        .tab-btn {
            flex: 1;
            padding: 1rem;
            background: none;
            border: none;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--color-text-muted);
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
        }

        /* Forms */
        .auth-content {
            text-align: left;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            color: var(--color-text-muted);
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 1rem;
            background: #fafafa;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-primary);
            background: white;
        }

        .submit-btn {
            width: 100%;
            background-color: var(--color-primary);
            color: var(--color-accent);
            padding: 1.1rem;
            border-radius: var(--radius-lg);
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: background-color 0.2s;
        }

        .submit-btn:hover {
            background-color: var(--color-primary-dark);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #signin-form {
            display: none;
        }

        /* Footer */
        footer {
            padding: 5rem 2rem;
            border-top: 1px solid var(--color-border);
            background-color: var(--color-background);
        }

        .footer-grid {
            max-width: var(--container-width);
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 3rem;
        }

        .footer-brand h2 {
            font-weight: 200;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .footer-links h4 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .footer-links ul {
            list-style: none;
        }

        .footer-links li {
            margin-bottom: 0.75rem;
        }

        .footer-links a {
            text-decoration: none;
            color: var(--color-text-muted);
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--color-primary);
        }

        .social-icons {
            display: flex;
            gap: 1.25rem;
            margin-top: 1.5rem;
        }

        .social-icons svg {
            width: 20px;
            height: 20px;
            fill: var(--color-text-muted);
            transition: fill 0.2s;
            cursor: pointer;
        }

        .social-icons svg:hover {
            fill: var(--color-primary);
        }

        .copyright {
            max-width: var(--container-width);
            margin: 4rem auto 0;
            padding-top: 2rem;
            border-top: 1px solid var(--color-border);
            text-align: center;
            font-size: 0.85rem;
            color: var(--color-text-muted);
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            .auth-card {
                padding: 2.5rem 1.5rem;
            }
        }
    </style>

    <main>
        <div class="auth-card">
            <div class="auth-header">
                <h1>Book<i>Lux</i></h1>
                <p style="color: var(--color-text-muted); font-size: 0.95rem;">Your private concierge awaits.</p>
            </div>

            <div class="tabs">
                <button class="tab-btn active" id="signup-tab-trigger" onclick="showTab('signup')">Sign Up</button>
                <button class="tab-btn" id="signin-tab-trigger" onclick="showTab('signin')">Sign In</button>
            </div>

            <div class="auth-content">
                <!-- SIGN UP FORM -->
                <form id="signup-form" data-backend="signup">
                    <input type="hidden" name="role" value="user">
                    
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" name="email" class="form-input" placeholder="name@example.com" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" class="form-input" placeholder="Create a password" minlength="6" required>
                    </div>

                    <button type="submit" class="submit-btn">Create Account</button>
                    
                    <p data-success style="display:none; color: #10b981; font-weight: 500; margin-top: 1.5rem; text-align: center; font-size: 0.9rem; padding: 1rem; background: #ecfdf5; border-radius: var(--radius-md);">
                        Registration successful! Please login.
                    </p>
                </form>

                <!-- SIGN IN FORM (UI ONLY) -->
                <form id="signin-form">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" name="email" class="form-input" placeholder="name@example.com" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" class="form-input" placeholder="Enter your password" required>
                    </div>

                    <button type="button" class="submit-btn">Sign In</button>
                    <p style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem;">
                        <a href="#" style="color: var(--color-text-muted); text-decoration: none;">Forgot password?</a>
                    </p>
                </form>
            </div>
        </div>
    </main>
