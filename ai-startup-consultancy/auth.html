        h1 {

            font-size: 2.2rem;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        h1 em {
            font-style: italic;
        }

        .auth-tabs {
            display: flex;
            border-bottom: 1px solid var(--color-border);
            margin: 2rem 0;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 1rem;
            font-family: var(--font-sans);
            font-size: 0.95rem;
            font-weight: 400;
            cursor: pointer;
            color: var(--color-text-muted);
            transition: color 0.2s, border-bottom 0.2s;
            position: relative;
        }

        .tab-btn.active {
            color: var(--color-text);
            font-weight: 500;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--color-primary);
        }

        .tab-content {
            display: none;
            text-align: left;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--color-text);
        }

        input {
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--color-border);
            border-radius: 12px;
            font-family: var(--font-sans);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--color-primary);
        }

        .submit-btn {
            width: 100%;
            background-color: var(--color-primary);
            color: var(--color-accent);
            padding: 1.1rem;
            border: none;
            border-radius: var(--radius-button);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 1rem;
            transition: background-color 0.2s;
        }

        .submit-btn:hover {
            background-color: var(--color-primary-dark);
        }

        .success-msg {
            background: #f0fff4;
            color: #22543d;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-top: 1.5rem;
            text-align: center;
        }

        /* --- Footer --- */
        footer {

        }

        .footer-content {
            max-width: 1200px;

            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        .footer-links {

        .footer-links a {
            font-size: 0.85rem;
            color: var(--color-text-muted);
        }

        .social-icons {

            gap: 1.5rem;
        }

        .social-icons svg {

            fill: var(--color-text-muted);
        }

        .copyright {
            font-size: 0.8rem;
            color: var(--color-text-muted);
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            .auth-card {
                padding: 2rem 1.5rem;
            }
        }
    </style>

    <script>
        // Tab switching logic
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab-btn');
            const contents = document.querySelectorAll('.tab-content');
            
            tabs.forEach(t => t.classList.remove('active'));
            contents.forEach(c => c.classList.remove('active'));
            
            if (tab === 'signin') {
                document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
                document.getElementById('signin-tab').classList.add('active');
            } else {
                document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
                document.getElementById('signup-tab').classList.add('active');
            }
        }

        // Backend integration script
        (function() {
            var BACKEND = 'http://localhost:3000/api';
            var TOKEN = '35d9436f174f6b11dbacbc5ccc4f11f39a8fc9cf73808a969c269431e9f06954';
            var DOMAIN = 'aistartupconsultancy.com';
            var HEADERS = { 'Content-Type': 'application/json', 'X-Token': TOKEN, 'X-Domain': DOMAIN };

            document.addEventListener('submit', function(e) {
                var form = e.target.closest('form[data-backend="signup"]');
                if (!form) return;
                e.preventDefault();
                
                var data = {};
                new FormData(form).forEach(function(v, k) { data[k] = v; });

                var btn = form.querySelector('button[type="submit"]');
                var originalText = '';
                if (btn) {
                    originalText = btn.innerText;
                    btn.innerText = 'Sending...';
                    btn.disabled = true;
                }

                fetch(BACKEND + '/users', {
                    method: 'POST',
                    headers: HEADERS,
                    body: JSON.stringify(data)
                }).then(function(r) { return r.json(); }).then(function(res) {
                    if (res.success) {
                        var msg = form.querySelector('[data-success]');
                        if (msg) { msg.style.display = 'block'; }
                        form.reset();
                        if (btn) btn.style.display = 'none';

                        // Auto-switch to Sign In tab after 2 seconds
                        setTimeout(function() {
                            switchTab('signin');
                            if (msg) msg.style.display = 'none';
                            if (btn) {
                                btn.style.display = 'block';
                                btn.innerText = originalText;
                                btn.disabled = false;
                            }
                        }, 2000);
                    } else {
                        alert(res.error || 'Failed to sign up');
                        if (btn) { btn.innerText = originalText; btn.disabled = false; }
                    }
                }).catch(function(){
                    alert('Network error occurred');
                    if (btn) { btn.innerText = originalText; btn.disabled = false; }
                });
            });
        })();
    </script>
