<head>
    <meta charset="UTF-8">

    <title>Sign In | test-yan-3 - Enterprise AI Strategy</title>
    <meta name="description" content="Access your enterprise AI strategy roadmap and initiative portfolio.">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        :root {
            --color-primary: #E11F26;
            --color-primary-dark: #BF1A20;
            --color-background: #080808;
            --color-surface: #141414;
            --color-text: #FFFFFF;
            --color-text-muted: #A0A0A0;
            --color-border: #2A2A2A;
            --color-accent: #FFFFFF;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --radius-pill: 999px;
            --radius-card: 32px;
            --radius-input: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            gap: 0.75rem;
        }

        .logo img {
            height: 32px;
            width: auto;
        }

        .logo span {
            color: var(--color-text);
            font-weight: 800;
            font-size: 1.25rem;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--color-text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--color-accent);
        }

        .nav-cta {
            background-color: var(--color-primary);
            color: var(--color-accent);
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-pill);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            transition: background-color 0.2s;
        }

        .nav-cta:hover {
            background-color: var(--color-primary-dark);
        }

        /* Auth Container */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 1.5rem 60px;
        }

        .auth-card {
            background-color: var(--color-surface);
            width: 100%;
            max-width: 480px;
            border-radius: var(--radius-card);
            padding: 3rem 2.5rem;
            border: 1px solid var(--color-border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -1.5px;
            margin-bottom: 0.75rem;
        }

        .auth-header p {
            color: var(--color-text-muted);
            font-size: 1rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background-color: #000000;
            padding: 6px;
            border-radius: var(--radius-pill);
            margin-bottom: 2.5rem;
            border: 1px solid var(--color-border);
        }

        .tab-btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            background: none;
            color: var(--color-text-muted);
            font-family: var(--font-sans);
            font-weight: 700;
            cursor: pointer;
            border-radius: var(--radius-pill);
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .tab-btn.active {
            background-color: var(--color-primary);
            color: var(--color-accent);
        }

        /* Form Styling */
        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            background-color: #000000;
            border: 1px solid var(--color-border);
            padding: 1rem 1.25rem;
            border-radius: var(--radius-input);
            color: var(--color-text);
            font-family: var(--font-sans);
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .submit-btn {
            width: 100%;
            background-color: var(--color-primary);
            color: var(--color-accent);
            border: none;
            padding: 1.1rem;
            border-radius: var(--radius-pill);
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            background-color: var(--color-primary-dark);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        /* Footer */
        footer {
            padding: 4rem 2rem;
            border-top: 1px solid var(--color-border);
            background-color: #050505;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 3rem;
        }

        .footer-brand {
            flex: 1;
            min-width: 250px;
        }

        .footer-brand p {
            color: var(--color-text-muted);
            margin-top: 1rem;
            max-width: 300px;
        }

        .footer-links {
            display: flex;
            gap: 4rem;
        }

        .footer-col h4 {
            font-weight: 800;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            color: var(--color-primary);
        }

        .footer-col ul {
            list-style: none;
        }

        .footer-col ul li {
            margin-bottom: 0.75rem;
        }

        .footer-col ul li a {
            color: var(--color-text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-col ul li a:hover {
            color: var(--color-accent);
        }

        .footer-bottom {
            max-width: 1200px;
            margin: 3rem auto 0;
            padding-top: 2rem;
            border-top: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--color-text-muted);
            font-size: 0.9rem;
        }

        .social-icons {
            display: flex;
            gap: 1.5rem;
        }

        .social-icons svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            cursor: pointer;
            transition: color 0.2s;
        }

        .social-icons svg:hover {
            color: var(--color-primary);
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            .auth-card {
                padding: 2.5rem 1.5rem;
            }
            .footer-links {
                gap: 2rem;
            }
        }
    </style>

                <p>Strategize, Implement, and Scale your Enterprise AI initiatives.</p>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('signup-form')" id="signup-tab">Sign Up</button>
                <button class="tab-btn" onclick="switchTab('signin-form')" id="signin-tab">Sign In</button>
            </div>

            <!-- Sign Up Form -->
            <form id="signup-form" class="auth-form active" data-backend="signup">
                <input type="hidden" name="role" value="user">
                <div class="form-group">
                    <label for="signup-email">Enterprise Email</label>
                    <input type="email" id="signup-email" name="email" placeholder="exec@company.com" required>
                </div>
                <div class="form-group">
                    <label for="signup-password">Secure Password</label>
                    <input type="password" id="signup-password" name="password" minlength="6" placeholder="••••••••" required>
                </div>
                <button type="submit" class="submit-btn">Create Account</button>
                <p data-success style="display:none; color: #22c55e; font-weight: 700; margin-top: 1.5rem; text-align: center; background: rgba(34, 197, 94, 0.1); padding: 1rem; border-radius: var(--radius-input);">
                    Registration successful! Preparing your dashboard...
                </p>
            </form>

            <!-- Sign In Form (UI Only) -->
            <form id="signin-form" class="auth-form">
                <div class="form-group">
                    <label for="signin-email">Email Address</label>
                    <input type="email" id="signin-email" name="email" placeholder="exec@company.com">
                </div>
                <div class="form-group">
                    <label for="signin-password">Password</label>
                    <input type="password" id="signin-password" name="password" placeholder="••••••••">
                </div>
                <button type="button" class="submit-btn">Sign In</button>
            </form>
        </div>
